<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Builder | Vision Education</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="grade-book.css" />
  
  <script src="theme.js"></script>
  <script>
    // Auth guard
    (function() {
      const session = sessionStorage.getItem('waec_session') || localStorage.getItem('waec_session');
      if (!session) {
        window.location.href = '/enterprise-login.html';
        return;
      }
      try {
        const user = JSON.parse(session);
        if (user.role !== 'teacher' && user.role !== 'enterprise') {
          alert('Access denied. Quiz builder is for teachers and administrators only.');
          window.location.href = '/dashboard.html';
        }
      } catch(e) {
        window.location.href = '/enterprise-login.html';
      }
    })();
  </script>
</head>

<body class="grade-book-page">
  
  <!-- Header -->
  <header class="gb-header">
    <div class="gb-header-left">
      <button class="gb-back-btn" onclick="window.history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
      <h1 class="gb-title">Quiz Builder</h1>
    </div>
    
    <div class="gb-header-right">
      <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      
      <div class="gb-user-info">
        <div class="gb-user-avatar" id="userAvatar">T</div>
        <span id="userName">Teacher</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="gb-main">
    
    <!-- Action Bar -->
    <div class="gb-class-selector">
      <button class="gb-btn-primary" onclick="showCreateQuizModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Create Quiz
      </button>
      
      <button class="gb-btn-secondary" onclick="generateAIQuiz()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        AI Generate
      </button>
      
      <button class="gb-btn-secondary" onclick="importQuiz()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Import
      </button>
    </div>

    <!-- Quizzes List -->
    <div class="gb-content">
      <div class="gb-section-header">
        <h2>My Quizzes</h2>
        <div style="display:flex;gap:0.75rem;">
          <select id="filterStatus" onchange="filterQuizzes()" style="padding:0.75rem 1rem;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-weight:600;">
            <option value="">All Status</option>
            <option value="draft">Draft</option>
            <option value="published">Published</option>
            <option value="archived">Archived</option>
          </select>
        </div>
      </div>
      
      <div class="gb-assignments-list" id="quizzesList">
        <div class="gb-empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>No quizzes yet</p>
          <span>Create your first quiz to assess student knowledge</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script type="module" src="firebase.js"></script>
  <script src="auth.js"></script>
  <script src="quiz-builder.js"></script>
</body>
</html>
