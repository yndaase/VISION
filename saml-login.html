<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise SSO | Vision Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { navy: '#05080f', emerald: '#10b981' }
                }
            }
        }
    </script>
</head>
<body class="bg-navy font-sans flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-[100px] top-[-10%] right-[-10%]"></div>
    <div class="absolute w-[400px] h-[400px] bg-indigo-500/10 rounded-full blur-[100px] bottom-[-10%] left-[-10%]"></div>

    <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-10 rounded-[3rem] shadow-2xl max-w-md w-full relative z-10 m-4">
        <div class="w-14 h-14 bg-gradient-to-br from-emerald-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl mb-8 shadow-lg shadow-emerald-500/20">V</div>
        <h1 class="text-3xl font-black text-white mb-2">Enterprise SSO</h1>
        <p class="text-gray-400 mb-8 font-medium">Single Sign-On portal for Vision Education staff and administrators.</p>

        <form id="ssoForm" class="space-y-5">
            <div>
                <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Corporate Email</label>
                <input type="email" id="email" class="w-full p-4 bg-navy rounded-2xl border border-white/10 focus:border-emerald-500 outline-none text-white font-medium transition-all" required placeholder="admin@visionedu.site">
            </div>
            <button type="submit" id="authBtn" class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-navy font-black rounded-2xl transition-all shadow-xl shadow-emerald-500/20 mt-4 flex items-center justify-center gap-2">
                <span>Secure Authentication</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('ssoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authBtn');
            const email = document.getElementById('email').value;
            const params = new URLSearchParams(window.location.search);
            const SAMLRequest = params.get('SAMLRequest');
            const RelayState = params.get('RelayState');

            if (!SAMLRequest) {
                alert("Missing SAML Request. Please start from the service provider (e.g., Zoho Mail).");
                return;
            }

            btn.innerHTML = 'Authenticating... <span class="animate-pulse">●●●</span>';
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                // Submit to custom Vercel SAML IdP
                const response = await fetch('/api/saml-idp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ SAMLRequest, RelayState, email })
                });

                if (response.ok) {
                    const html = await response.text();
                    document.open();
                    document.write(html);
                    document.close();
                } else {
                    const err = await response.json();
                    alert("Authentication Error: " + err.error);
                    btn.innerHTML = 'Secure Authentication';
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                }
            } catch (err) {
                alert("Network error.");
                btn.innerHTML = 'Secure Authentication';
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
