<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision AI — Login Required</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #ffffff;
      --bg-card:     #f8f9fa;
      --bg-input:    #ffffff;
      --border:      #e0e0e0;
      --primary:     #FFC107;
      --primary-dark:#F9A825;
      --primary-glow:rgba(255,193,7,0.2);
      --accent:      #FF9800;
      --text:        #2c3e50;
      --text-muted:  #6c757d;
      --success:     #4CAF50;
      --radius:      12px;
      --font:        'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body { 
      height: 100%; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: var(--font); 
      color: var(--text);
      overflow: hidden;
    }

    /* Animated Background */
    .login-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .bg-orb-1 {
      width: 400px;
      height: 400px;
      background: #FFC107;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 500px;
      height: 500px;
      background: #FF9800;
      bottom: -150px;
      right: -150px;
      animation-delay: 5s;
    }

    .bg-orb-3 {
      width: 350px;
      height: 350px;
      background: #4CAF50;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Login Container */
    .login-container {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo & Header */
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.8rem;
      color: white;
      box-shadow: 0 8px 24px var(--primary-glow);
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo-text span {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: 24px;
      padding: 8px 16px;
      margin-bottom: 24px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--success);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Google Button */
    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
    }

    .google-btn:hover {
      border-color: var(--primary);
      background: #FFFBF0;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font);
      color: var(--text);
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--primary-glow);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Links */
    .login-links {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .login-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .login-links a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* Error Message */
    .error-message {
      display: none;
      padding: 12px 16px;
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: var(--radius);
      color: #f44336;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .error-message.show {
      display: block;
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* Success Message */
    .success-message {
      display: none;
      padding: 12px 16px;
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: var(--radius);
      color: var(--success);
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .success-message.show {
      display: block;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .login-card {
        padding: 32px 24px;
      }

      .login-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-bg">
    <span class="bg-orb bg-orb-1"></span>
    <span class="bg-orb bg-orb-2"></span>
    <span class="bg-orb bg-orb-3"></span>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">V</div>
        <div class="logo-text">Vision <span>AI</span></div>
      </div>

      <!-- Status Badge -->
      <div style="text-align: center;">
        <div class="status-badge">
          <div class="status-dot"></div>
          AI Engine Online
        </div>
      </div>

      <!-- Header -->
      <div class="login-header">
        <h1 class="login-title">Welcome to Vision AI</h1>
        <p class="login-subtitle">Sign in to access your WASSCE intelligence engine with unlimited AI-powered learning</p>
      </div>

      <!-- Messages -->
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- Google Sign-In -->
      <button class="google-btn" id="googleSignInBtn" onclick="triggerGoogleSignIn()">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <!-- Hidden Google Button -->
      <div style="position: absolute; opacity: 0; pointer-events: none;">
        <div id="g_id_onload"
          data-client_id="378999569796-v8bj9miq61sggvpea5sbslc24dr9t71s.apps.googleusercontent.com"
          data-context="signin"
          data-ux_mode="popup"
          data-callback="handleGoogleCredential"
          data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
      </div>

      <div class="divider">or continue with email</div>

      <!-- Email Login Form -->
      <form class="login-form" id="loginForm" onsubmit="handleEmailLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="yourname@school.edu.gh"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Sign In to Vision AI
        </button>
      </form>

      <!-- Links -->
      <div class="login-links">
        Don't have an account? <a href="/login">Create one here</a><br>
        <a href="/login">Forgot password?</a>
      </div>
    </div>
  </div>

  <!-- Auth Script -->
  <script src="auth.js"></script>
  <script>
    const SESSION_KEY = "waec_session";

    // Check if already logged in
    function checkExistingSession() {
      const session = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
      if (session) {
        try {
          const user = JSON.parse(session);
          if (user && user.email) {
            // Already logged in, redirect to Vision AI
            window.location.href = '/vision-ai.html';
            return true;
          }
        } catch (e) {
          console.error('Session parse error:', e);
        }
      }
      return false;
    }

    // Show error message
    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    // Show success message
    function showSuccess(message) {
      const successEl = document.getElementById('successMessage');
      successEl.textContent = message;
      successEl.classList.add('show');
    }

    // Handle Google Sign-In
    function triggerGoogleSignIn() {
      // The Google button will be triggered automatically
      const googleBtn = document.querySelector('.g_id_signin');
      if (googleBtn) {
        googleBtn.click();
      }
    }

    // Google credential callback (called by Google)
    async function handleGoogleCredential(response) {
      try {
        // Decode JWT payload
        const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        
        const user = {
          name: payload.name || 'Google User',
          email: payload.email || '',
          picture: payload.picture || '',
          provider: 'google',
          sub: payload.sub,
          role: 'student'
        };

        // Save session
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
        localStorage.setItem(SESSION_KEY, JSON.stringify(user));

        showSuccess('Welcome, ' + user.name + '! Redirecting to Vision AI...');
        
        setTimeout(() => {
          window.location.href = '/vision-ai.html';
        }, 1000);
      } catch (e) {
        console.error('Google Sign-In error:', e);
        showError('Google sign-in failed. Please try again.');
      }
    }

    // Handle Email Login
    async function handleEmailLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');

      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        // Use the existing auth system
        if (typeof handleLogin === 'function') {
          // Populate the main login form fields
          const loginEmail = document.createElement('input');
          loginEmail.id = 'loginEmail';
          loginEmail.value = email;
          
          const loginPass = document.createElement('input');
          loginPass.id = 'loginPass';
          loginPass.value = password;
          
          document.body.appendChild(loginEmail);
          document.body.appendChild(loginPass);
          
          // Call the main auth handler
          await handleLogin({ preventDefault: () => {} });
          
          // Clean up
          loginEmail.remove();
          loginPass.remove();
          
          // Check if login was successful
          const session = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
          if (session) {
            showSuccess('Login successful! Redirecting...');
            setTimeout(() => {
              window.location.href = '/vision-ai.html';
            }, 1000);
          } else {
            showError('Invalid email or password.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In to Vision AI';
          }
        } else {
          showError('Authentication system not loaded. Please refresh the page.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In to Vision AI';
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('Login failed. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In to Vision AI';
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Check if already logged in
      if (!checkExistingSession()) {
        // Not logged in, show the login form
        console.log('Vision AI Login - Ready');
      }
    });

    // Make handleGoogleCredential globally available
    window.handleGoogleCredential = handleGoogleCredential;
  </script>
</body>
</html>
