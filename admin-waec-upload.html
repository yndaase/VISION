<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <script>
    document.documentElement.setAttribute("data-theme", "dark");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload WAEC Questions | Admin Panel</title>
  
  <!-- Vision Loading Screen - Inline -->
  <style>.vision-loader-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f172a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;transition:opacity .4s ease,visibility .4s ease}.vision-loader-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}.vision-loader-content{display:flex;flex-direction:column;align-items:center;gap:2rem;animation:fadeInUp .6s ease}@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.vision-loader-logo{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}.vision-loader-logo img{width:80px;height:80px;object-fit:contain;position:relative;z-index:2;animation:logoFloat 2s ease-in-out infinite}@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.vision-loader-ring{position:absolute;width:100%;height:100%;border:3px solid transparent;border-top-color:#6366f1;border-right-color:#6366f1;border-radius:50%;animation:spin 1.2s cubic-bezier(.5,0,.5,1) infinite}.vision-loader-ring:nth-child(2){width:90%;height:90%;border-top-color:rgba(99,102,241,.5);border-right-color:rgba(99,102,241,.5);animation-duration:1.5s;animation-direction:reverse}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}.vision-loader-title{font-size:1.8rem;font-weight:900;letter-spacing:-.02em;color:#f1f5f9;margin-bottom:.5rem;animation:fadeIn .8s ease .2s both}.vision-loader-subtitle{font-size:.9rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;animation:fadeIn .8s ease .4s both}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.vision-loader-bar{width:200px;height:4px;background:rgba(99,102,241,.1);border-radius:2px;overflow:hidden;animation:fadeIn .8s ease .6s both}.vision-loader-bar-fill{height:100%;background:linear-gradient(90deg,#6366f1 0,#8b5cf6 50%,#6366f1 100%);background-size:200% 100%;border-radius:2px;animation:loadingBar 1.5s ease-in-out infinite}@keyframes loadingBar{0%{width:0;background-position:0 0}50%{width:70%;background-position:100% 0}100%{width:100%;background-position:200% 0}}.vision-loader-text{font-size:.85rem;color:#94a3b8;font-weight:500;animation:pulse 1.5s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}.vision-loader-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}@keyframes dots{0%,20%{content:''}40%{content:'.'}60%{content:'..'}80%,100%{content:'...'}}@media (max-width:600px){.vision-loader-logo{width:100px;height:100px}.vision-loader-logo img{width:64px;height:64px}.vision-loader-title{font-size:1.5rem}.vision-loader-subtitle{font-size:.8rem}.vision-loader-bar{width:160px}}[data-theme=light] .vision-loader-overlay{background:#fff}[data-theme=light] .vision-loader-title{color:#1e293b}[data-theme=light] .vision-loader-subtitle{color:#64748b}</style>
  <script>(function(){var e='<div id="visionLoader" class="vision-loader-overlay"><div class="vision-loader-content"><div class="vision-loader-logo"><div class="vision-loader-ring"></div><div class="vision-loader-ring"></div><img src="/assets/logo.png" alt="Vision Education" onerror="this.style.display=\'none\'"></div><div style="text-align:center;"><h1 class="vision-loader-title">Vision Education</h1><p class="vision-loader-subtitle">Excellence in Learning</p></div><div class="vision-loader-bar"><div class="vision-loader-bar-fill"></div></div><p class="vision-loader-text">Loading<span class="vision-loader-dots"></span></p></div></div>';document.body?document.body.insertAdjacentHTML("afterbegin",e):document.addEventListener("DOMContentLoaded",function(){document.body.insertAdjacentHTML("afterbegin",e)});var o=function(){var e=document.getElementById("visionLoader");e&&setTimeout(function(){e.classList.add("hidden"),document.body.style.overflow="",setTimeout(function(){e.parentNode&&e.remove()},400)},800)};"complete"===document.readyState?o():window.addEventListener("load",o),document.body.style.overflow="hidden"})();</script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="theme.js"></script>
  <link rel="stylesheet" href="theme.css" />
  
  <style>
    .admin-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .admin-header {
      margin-bottom: 3rem;
      text-align: center;
    }

    .admin-title {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .admin-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .upload-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .form-input,
    .form-select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .file-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255, 255, 255, 0.02);
    }

    .file-upload-area:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
    }

    .file-upload-area.dragover {
      border-color: var(--primary);
      background: var(--primary-dim);
      transform: scale(1.02);
    }

    .upload-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      color: var(--text-muted);
    }

    .upload-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .upload-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .file-info {
      display: none;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-top: 1rem;
    }

    .file-info.show {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .file-icon {
      width: 40px;
      height: 40px;
      background: var(--primary-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }

    .file-details {
      flex: 1;
    }

    .file-name {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .file-size {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--error);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .btn-remove:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    .btn-upload {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1.5rem;
    }

    .btn-upload:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
    }

    .btn-upload:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 1rem 1.25rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1.5rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }

    .alert-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #f87171;
    }

    .uploaded-list {
      margin-top: 3rem;
    }

    .list-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }

    .uploaded-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .item-info {
      flex: 1;
    }

    .item-title {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .item-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-delete {
      background: var(--error);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #dc2626;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="admin-container">
    <!-- Back Button -->
    <div style="margin-bottom: 2rem;">
      <a href="/admin" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 600; padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-input); transition: all 0.2s;" onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-secondary)'">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Admin
      </a>
    </div>

    <!-- Header -->
    <div class="admin-header">
      <h1 class="admin-title">Upload WAEC Past Questions</h1>
      <p class="admin-subtitle">Upload PDF files to Vercel Blob Storage for student access</p>
    </div>

    <!-- Alert Messages -->
    <div id="alertSuccess" class="alert alert-success"></div>
    <div id="alertError" class="alert alert-error"></div>

    <!-- Upload Form -->
    <div class="upload-card">
      <form id="uploadForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Subject</label>
            <select class="form-select" id="subject" required>
              <option value="">Select Subject</option>
              <option value="Mathematics">Mathematics</option>
              <option value="English">English Language</option>
              <option value="Physics">Physics</option>
              <option value="Chemistry">Chemistry</option>
              <option value="Biology">Biology</option>
              <option value="Economics">Economics</option>
              <option value="Geography">Geography</option>
              <option value="Literature">Literature in English</option>
              <option value="Government">Government</option>
              <option value="History">History</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Year</label>
            <select class="form-select" id="year" required>
              <option value="">Select Year</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Paper Type</label>
            <select class="form-select" id="paperType" required>
              <option value="">Select Type</option>
              <option value="objective">Objective (Paper 1)</option>
              <option value="theory">Theory (Paper 2)</option>
              <option value="practical">Practical (Paper 3)</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Duration</label>
            <input type="text" class="form-input" id="duration" placeholder="e.g., 3 hours" />
          </div>

          <div class="form-group">
            <label class="form-label">Number of Questions</label>
            <input type="number" class="form-input" id="questions" placeholder="e.g., 50" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Title (Optional)</label>
          <input type="text" class="form-input" id="title" placeholder="Auto-generated if left empty" />
        </div>

        <!-- File Upload Area -->
        <div class="form-group">
          <label class="form-label">PDF File</label>
          <div class="file-upload-area" id="fileUploadArea">
            <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-hint">PDF files only (Max 50MB)</div>
            <input type="file" id="fileInput" accept=".pdf" hidden required />
          </div>

          <div class="file-info" id="fileInfo">
            <div class="file-icon">
              <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
              </svg>
            </div>
            <div class="file-details">
              <div class="file-name" id="fileName"></div>
              <div class="file-size" id="fileSize"></div>
            </div>
            <button type="button" class="btn-remove" onclick="removeFile()">
              <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-upload" id="uploadBtn">
          Upload to Vercel Blob
        </button>
      </form>
    </div>

    <!-- Uploaded Questions List -->
    <div class="uploaded-list">
      <h2 class="list-title">Recently Uploaded</h2>
      <div id="uploadedList">
        <!-- Dynamically populated -->
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="admin-waec-upload.js"></script>
</body>
</html>
