<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  
  <!-- Vision EDU Universal Loading Screen -->
  <script src="/loading-screen-universal.js"></script>
  
  <script>
    document.documentElement.setAttribute("data-theme", "dark");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload WAEC Questions | Admin Panel</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="theme.js"></script>
  <link rel="stylesheet" href="theme.css" />
  
  <style>
    .admin-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .admin-header {
      margin-bottom: 3rem;
      text-align: center;
    }

    .admin-title {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .admin-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .upload-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .form-input,
    .form-select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .file-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255, 255, 255, 0.02);
    }

    .file-upload-area:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
    }

    .file-upload-area.dragover {
      border-color: var(--primary);
      background: var(--primary-dim);
      transform: scale(1.02);
    }

    .upload-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      color: var(--text-muted);
    }

    .upload-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .upload-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .file-info {
      display: none;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-top: 1rem;
    }

    .file-info.show {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .file-icon {
      width: 40px;
      height: 40px;
      background: var(--primary-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }

    .file-details {
      flex: 1;
    }

    .file-name {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .file-size {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--error);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .btn-remove:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    .btn-upload {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1.5rem;
    }

    .btn-upload:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
    }

    .btn-upload:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 1rem 1.25rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1.5rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }

    .alert-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #f87171;
    }

    .uploaded-list {
      margin-top: 3rem;
    }

    .list-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }

    .uploaded-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .item-info {
      flex: 1;
    }

    .item-title {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .item-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-delete {
      background: var(--error);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #dc2626;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="admin-container">
    <!-- Back Button -->
    <div style="margin-bottom: 2rem;">
      <a href="/admin" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 600; padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-input); transition: all 0.2s;" onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-secondary)'">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Admin
      </a>
    </div>

    <!-- Header -->
    <div class="admin-header">
      <h1 class="admin-title">Upload WAEC Past Questions</h1>
      <p class="admin-subtitle">Upload PDF files to Vercel Blob Storage for student access</p>
    </div>

    <!-- Alert Messages -->
    <div id="alertSuccess" class="alert alert-success"></div>
    <div id="alertError" class="alert alert-error"></div>

    <!-- Upload Form -->
    <div class="upload-card">
      <form id="uploadForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Subject</label>
            <select class="form-select" id="subject" required>
              <option value="">Select Subject</option>
              <option value="Mathematics">Mathematics</option>
              <option value="English">English Language</option>
              <option value="Physics">Physics</option>
              <option value="Chemistry">Chemistry</option>
              <option value="Biology">Biology</option>
              <option value="Economics">Economics</option>
              <option value="Geography">Geography</option>
              <option value="Literature">Literature in English</option>
              <option value="Government">Government</option>
              <option value="History">History</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Year</label>
            <select class="form-select" id="year" required>
              <option value="">Select Year</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Paper Type</label>
            <select class="form-select" id="paperType" required>
              <option value="">Select Type</option>
              <option value="objective">Objective (Paper 1)</option>
              <option value="theory">Theory (Paper 2)</option>
              <option value="practical">Practical (Paper 3)</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Duration</label>
            <input type="text" class="form-input" id="duration" placeholder="e.g., 3 hours" />
          </div>

          <div class="form-group">
            <label class="form-label">Number of Questions</label>
            <input type="number" class="form-input" id="questions" placeholder="e.g., 50" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Title (Optional)</label>
          <input type="text" class="form-input" id="title" placeholder="Auto-generated if left empty" />
        </div>

        <!-- File Upload Area -->
        <div class="form-group">
          <label class="form-label">PDF File</label>
          <div class="file-upload-area" id="fileUploadArea">
            <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-hint">PDF files only (Max 50MB)</div>
            <input type="file" id="fileInput" accept=".pdf" hidden required />
          </div>

          <div class="file-info" id="fileInfo">
            <div class="file-icon">
              <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
              </svg>
            </div>
            <div class="file-details">
              <div class="file-name" id="fileName"></div>
              <div class="file-size" id="fileSize"></div>
            </div>
            <button type="button" class="btn-remove" onclick="removeFile()">
              <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-upload" id="uploadBtn">
          Upload to Vercel Blob
        </button>
      </form>
    </div>

    <!-- Uploaded Questions List -->
    <div class="uploaded-list">
      <h2 class="list-title">Recently Uploaded</h2>
      <div id="uploadedList">
        <!-- Dynamically populated -->
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="admin-waec-upload.js"></script>
</body>
</html>
