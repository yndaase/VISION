<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Upload WAEC Questions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2rem;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      background: #f8f9ff;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover {
      background: #f0f2ff;
      border-color: #764ba2;
    }
    .upload-area.dragover {
      background: #e8ebff;
      border-color: #764ba2;
      transform: scale(1.02);
    }
    .upload-icon {
      font-size: 4rem;
      margin-bottom: 15px;
    }
    input[type="file"] {
      display: none;
    }
    .file-list {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
    }
    .file-item {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .file-info {
      flex: 1;
    }
    .file-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    .file-meta {
      display: flex;
      gap: 15px;
      margin-top: 8px;
    }
    .file-meta select, .file-meta input {
      padding: 5px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 0.85rem;
    }
    .remove-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .remove-btn:hover {
      background: #dc2626;
    }
    .upload-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: all 0.3s;
    }
    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    .upload-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    .progress {
      margin-top: 20px;
      display: none;
    }
    .progress-bar {
      background: #e0e0e0;
      border-radius: 10px;
      height: 30px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      background: linear-gradient(90deg, #667eea, #764ba2);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .status {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }
    .success {
      color: #10b981;
      font-weight: 600;
    }
    .error {
      color: #ef4444;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Bulk Upload WAEC Questions</h1>
    <p class="subtitle">Upload multiple WAEC/WASSCE past question PDFs at once</p>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📄</div>
      <h3>Drop PDF files here or click to browse</h3>
      <p style="color: #999; margin-top: 10px;">Supports multiple PDF files</p>
      <input type="file" id="fileInput" accept=".pdf" multiple>
    </div>

    <div class="file-list" id="fileList"></div>

    <button class="upload-btn" id="uploadBtn" disabled>Upload All Questions</button>

    <div class="progress" id="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill">0%</div>
      </div>
      <div class="status" id="status">Preparing upload...</div>
    </div>
  </div>

  <script>
    // Check admin authentication
    const ADMIN_SESSION_KEY = "vision_admin_session";
    
    function checkAdminAuth() {
      const adminSession = sessionStorage.getItem(ADMIN_SESSION_KEY);
      
      if (!adminSession) {
        // Admin is not logged in - redirect to admin panel
        alert('Please log in to the admin panel to upload questions');
        window.location.href = '/admin.html';
        return false;
      }
      return true;
    }
    
    // Run auth check when page loads
    if (!checkAdminAuth()) {
      // Stop script execution if not authenticated
      throw new Error('Authentication required');
    }

    let selectedFiles = [];
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const status = document.getElementById('status');

    // Click to upload
    uploadArea.addEventListener('click', () => fileInput.click());

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    // File input change
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    function handleFiles(files) {
      for (let file of files) {
        if (file.type === 'application/pdf') {
          // Parse filename to extract metadata
          const metadata = parseFilename(file.name);
          selectedFiles.push({
            file: file,
            ...metadata
          });
        }
      }
      renderFileList();
      uploadBtn.disabled = selectedFiles.length === 0;
    }

    function parseFilename(filename) {
      // Try to extract subject, year, and type from filename
      // Example: "WAEC_Mathematics_2024_Objective.pdf"
      const parts = filename.replace('.pdf', '').split(/[_\-\s]+/);
      
      return {
        subject: parts[1] || 'Mathematics',
        year: parts[2] || new Date().getFullYear(),
        paperType: (parts[3] || 'objective').toLowerCase()
      };
    }

    function renderFileList() {
      fileList.innerHTML = selectedFiles.map((item, index) => `
        <div class="file-item">
          <div class="file-info">
            <div class="file-name">${item.file.name}</div>
            <div class="file-meta">
              <select onchange="updateMetadata(${index}, 'subject', this.value)">
                <option value="Mathematics" ${item.subject === 'Mathematics' ? 'selected' : ''}>Mathematics</option>
                <option value="English" ${item.subject === 'English' ? 'selected' : ''}>English</option>
                <option value="Physics" ${item.subject === 'Physics' ? 'selected' : ''}>Physics</option>
                <option value="Chemistry" ${item.subject === 'Chemistry' ? 'selected' : ''}>Chemistry</option>
                <option value="Biology" ${item.subject === 'Biology' ? 'selected' : ''}>Biology</option>
                <option value="Economics" ${item.subject === 'Economics' ? 'selected' : ''}>Economics</option>
                <option value="Geography" ${item.subject === 'Geography' ? 'selected' : ''}>Geography</option>
                <option value="Literature" ${item.subject === 'Literature' ? 'selected' : ''}>Literature</option>
              </select>
              <input type="number" value="${item.year}" onchange="updateMetadata(${index}, 'year', this.value)" placeholder="Year" style="width: 80px;">
              <select onchange="updateMetadata(${index}, 'paperType', this.value)">
                <option value="objective" ${item.paperType === 'objective' ? 'selected' : ''}>Objective</option>
                <option value="theory" ${item.paperType === 'theory' ? 'selected' : ''}>Theory</option>
                <option value="practical" ${item.paperType === 'practical' ? 'selected' : ''}>Practical</option>
              </select>
            </div>
          </div>
          <button class="remove-btn" onclick="removeFile(${index})">Remove</button>
        </div>
      `).join('');
    }

    window.updateMetadata = (index, field, value) => {
      selectedFiles[index][field] = value;
    };

    window.removeFile = (index) => {
      selectedFiles.splice(index, 1);
      renderFileList();
      uploadBtn.disabled = selectedFiles.length === 0;
    };

    uploadBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      // Get auth token
      const user = window.fbAuth?.currentUser;
      if (!user) {
        alert('Please log in first!');
        window.location.href = '/login.html';
        return;
      }

      const token = await user.getIdToken();

      uploadBtn.disabled = true;
      progress.style.display = 'block';

      let uploaded = 0;
      const total = selectedFiles.length;

      for (let item of selectedFiles) {
        try {
          status.textContent = `Uploading ${item.file.name}...`;
          
          // Convert file to base64
          const base64 = await fileToBase64(item.file);

          // Upload to API
          const response = await fetch('/api/waec-questions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
              subject: item.subject,
              year: parseInt(item.year),
              paperType: item.paperType,
              title: `WAEC ${item.subject} ${item.year} - ${item.paperType}`,
              duration: item.paperType === 'objective' ? '2 hours' : '3 hours',
              questions: item.paperType === 'objective' ? 50 : 13,
              fileData: base64,
              fileName: item.file.name
            })
          });

          if (response.ok) {
            uploaded++;
            const percent = Math.round((uploaded / total) * 100);
            progressFill.style.width = percent + '%';
            progressFill.textContent = percent + '%';
            status.innerHTML = `<span class="success">✓ Uploaded ${uploaded} of ${total}</span>`;
          } else {
            const error = await response.json();
            status.innerHTML = `<span class="error">✗ Failed: ${item.file.name} - ${error.error}</span>`;
          }
        } catch (error) {
          console.error('Upload error:', error);
          status.innerHTML = `<span class="error">✗ Error uploading ${item.file.name}</span>`;
        }
      }

      if (uploaded === total) {
        status.innerHTML = `<span class="success">🎉 All ${total} files uploaded successfully!</span>`;
        setTimeout(() => {
          window.location.href = '/waec-past-questions.html';
        }, 2000);
      } else {
        uploadBtn.disabled = false;
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>
  <script type="module" src="firebase.js"></script>
</body>
</html>
