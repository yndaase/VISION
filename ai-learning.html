<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <script>
    document.documentElement.setAttribute("data-theme", "dark");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Learning Hub | Vision Education</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="theme.css" />
  <style>
    .learning-hub-layout {
      display: flex;
      height: 100vh;
      background: var(--bg);
    }

    .learning-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-left: 250px;
    }

    .learning-workspace {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .ai-vision-card {
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      text-align: center;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-premium);
      position: relative;
      overflow: hidden;
    }

    .upload-area {
      border: 2px dashed var(--border-bright);
      border-radius: var(--radius-md);
      padding: 3rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.02);
      margin-top: 1.5rem;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
    }

    .chat-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      margin-top: 2rem;
    }

    .chat-messages {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-bubble {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .bubble-ai {
      background: var(--primary-dim);
      border: 1px solid var(--border-accent);
      align-self: flex-start;
      color: var(--text-primary);
    }

    .bubble-user {
      background: var(--bg-input);
      border: 1px solid var(--border);
      align-self: flex-end;
      color: var(--text-secondary);
    }

    .chat-input-area {
      padding: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }

    .learning-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: inherit;
    }

    .preview-img {
      max-width: 100%;
      max-height: 300px;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      display: none;
    }

    @media (max-width: 900px) {
      .learning-main { margin-left: 0; padding-bottom: 70px; }
    }
  </style>
</head>

<body class="dashboard-page">
  <aside class="side-nav">
    <a class="side-nav-logo" href="dashboard.html">
      <img src="assets/logo.png" alt="Logo" style="height: 48px; width: 48px; object-fit: contain;">
      <span>Vision Edu</span>
    </a>
    <nav class="side-nav-menu">
      <a href="dashboard.html" class="nav-item"><span>Dashboard</span></a>
      <a href="mocks.html" class="nav-item"><span>Mock Exams</span></a>
      <a href="ai-learning.html" class="nav-item active"><span>AI Learning Hub</span></a>
    </nav>
  </aside>

  <div class="learning-main">
    <section class="learning-workspace">
      <div class="ai-vision-card">
        <h1 class="welcome-heading" style="font-size: 2.5rem;">AI <span class="brand-accent">Learning Hub</span></h1>
        <p class="welcome-sub">Import pictures of math problems for instant visual guidance.</p>
        
        <img id="imagePreview" class="preview-img" alt="Preview">
        
        <div class="upload-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
          <p id="uploadText">Drag & drop or click to <strong>Import Picture</strong></p>
          <input type="file" id="fileInput" hidden accept="image/*">
        </div>
      </div>

      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-bubble bubble-ai">
            Hello! I am your AI Learning Specialist. Import a picture of a math diagram or type a question below to get started.
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" class="learning-input" placeholder="Type your math question here...">
          <button class="cta-btn" id="sendBtn" style="padding: 10px 24px; font-size: 0.8rem;">SEND</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const chatMessages = document.getElementById('chatMessages');
    const sendBtn = document.getElementById('sendBtn');
    const chatInput = document.getElementById('chatInput');
    const uploadText = document.getElementById('uploadText');

    let currentBase64 = null;
    let currentMimeType = null;

    fileInput.onchange = e => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    };

    function handleFile(file) {
      currentMimeType = file.type;
      const reader = new FileReader();
      reader.onload = () => {
        currentBase64 = reader.result.split(',')[1];
        imagePreview.src = reader.result;
        imagePreview.style.display = 'block';
        uploadText.innerHTML = `<strong>File Loaded:</strong> ${file.name}`;
      };
      reader.readAsDataURL(file);
    }

    sendBtn.onclick = async () => {
      const message = chatInput.value.trim();
      if (!message && !currentBase64) return;

      appendMessage('user', message || "Analyzing image...");
      chatInput.value = '';
      
      const res = await fetch('/api/ai-vision', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          imageBase64: currentBase64,
          mimeType: currentMimeType,
          userMessage: message
        })
      });

      const data = await res.json();
      appendMessage('ai', data.analysis || data.error);
      
      // Clear current file after send
      currentBase64 = null;
      imagePreview.style.display = 'none';
      uploadText.innerHTML = `Drag & drop or click to <strong>Import Picture</strong>`;
    };

    function appendMessage(role, text) {
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble bubble-${role}`;
      bubble.innerText = text;
      chatMessages.appendChild(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  </script>
</body>
</html>
