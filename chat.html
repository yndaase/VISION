<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Private Comm | Enterprise-Grade E2EE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat.css">
    <script src="chat-engine.js"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="chat-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div style="background: var(--accent); color: white; border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.4rem; cursor: pointer; box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);" onclick="window.location.href='robotics-dashboard.html'" title="Back to Dashboard">V</div>
                <input type="text" class="search-box" placeholder="Search hardware team...">
            </div>
            
            <div class="contact-list" id="contactList">
                <!-- Sorted Contacts populated by JS -->
            </div>
        </aside>

        <!-- MAIN CHAT -->
        <main class="main-chat">
            <div id="noChatSelected" style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); flex-direction: column; gap: 20px; padding: 40px; text-align: center;">
                <div style="width: 120px; height: 120px; background: rgba(74, 222, 128, 0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: pulse 2s infinite;">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h2 style="font-weight: 700; color: white;">Vision Private Comm</h2>
                <p style="max-width: 300px; font-size: 0.95rem; line-height: 1.6;">Select a registered team member to initiate a hardware-secured, end-to-end encrypted session.</p>
                <div class="status-indicator">LOCALLY SECURED & SYNCED</div>
            </div>

            <div id="activeChat" style="display: none; flex: 1; flex-direction: column;">
                <div class="chat-header">
                    <div class="header-user">
                        <div class="avatar" id="headerAvatar" style="width: 40px; height: 40px; font-size: 1rem;">?</div>
                        <div>
                            <h4 id="headerName" style="font-size: 1.1rem; margin-bottom: 2px;">Team Member</h4>
                            <div class="encryption-badge">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
                                SECURE E2EE SESSION
                            </div>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="btn-icon" onclick="toggleInfoPanel()" title="Engineering Intelligence">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        </button>
                    </div>
                </div>

                <div class="message-list" id="messageList">
                    <!-- Messages populated by JS -->
                </div>

                <div class="input-area">
                    <div class="input-container">
                        <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="Attach File (Max 100MB)">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">
                        
                        <textarea class="chat-textarea" id="chatInput" placeholder="Write a secure message..." rows="1"></textarea>
                    </div>

                    <button class="btn-send" onclick="sendMessage()" title="Send Message">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- INTELLIGENCE PANEL (3RD COLUMN) -->
        <aside class="info-panel" id="infoPanel">
            <div class="panel-header">Intelligence & Controls</div>
            <div class="panel-content" id="panelContent">
                <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                    Select a thread to view hardware telemetry and security fingerprints.
                </div>
            </div>
            
            <div class="panel-footer">
                <button class="panel-btn" onclick="exportConversation()" title="Download secure transcript">Export Secure Log</button>
                <button class="panel-btn danger" onclick="clearSecureHistory()" title="Locally purge this encryption thread">Clear Secure History</button>
            </div>
        </aside>
    </div>

    <script src="chat.js" defer></script>
</body>
</html>
