<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grant Pro — Vision Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:#05080f; color:#f1f5f9; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:2rem; padding:2.5rem; max-width:460px; width:100%; }
    h1 { font-size:1.5rem; font-weight:800; margin-bottom:0.25rem; text-align:center; }
    p.sub { color:#64748b; font-size:0.88rem; text-align:center; margin-bottom:1.5rem; }
    label { display:block; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:#64748b; margin-bottom:6px; }
    input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#f1f5f9; font-family:'Outfit',sans-serif; font-size:0.95rem; outline:none; margin-bottom:1rem; }
    input:focus { border-color:#6366f1; }
    .btn { width:100%; padding:14px; background:linear-gradient(135deg,#6366f1,#8b5cf6); border:none; border-radius:12px; color:#fff; font-family:'Outfit',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; transition:opacity .2s; margin-top:4px; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .target { background:rgba(99,102,241,0.08); border:1px solid rgba(99,102,241,0.25); border-radius:12px; padding:12px 16px; margin:1.25rem 0; font-size:0.88rem; color:#818cf8; font-weight:700; text-align:center; }
    #log { margin-top:1.25rem; font-size:0.8rem; background:rgba(0,0,0,0.35); border-radius:10px; padding:12px 14px; min-height:70px; border:1px solid rgba(255,255,255,0.06); white-space:pre-wrap; font-family:monospace; color:#94a3b8; }
    .ok  { color:#4ade80; }
    .err { color:#f87171; }
    #step2 { display:none; }
  </style>
</head>
<body>
<div class="card">
  <h1>🔐 Grant Pro Access</h1>
  <p class="sub">Sign in as admin, then upgrade the account</p>

  <!-- STEP 1: Admin Login -->
  <div id="step1">
    <label>Your Admin Email</label>
    <input id="adminEmail" type="email" placeholder="admin@visionedu.online" />
    <label>Password</label>
    <input id="adminPass" type="password" placeholder="••••••••" />
    <button class="btn" onclick="adminLogin()">Sign In as Admin</button>
    <div id="log">Enter your admin credentials above.</div>
  </div>

  <!-- STEP 2: Grant Pro -->
  <div id="step2">
    <div class="target">
      Target: <strong>gisgreat308@gmail.com</strong><br>
      Role: <strong>student → pro</strong>
    </div>
    <button class="btn" id="grantBtn" onclick="grantPro()">✦ Grant Pro Now</button>
    <div id="log2">Signed in. Click the button above.</div>
  </div>
</div>

<script type="module">
  import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc }
                                     from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword }
                                     from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const config = {
    apiKey: "AIzaSyCCLvmFR4NU6aIbDc-75EsBL-K9pqlNa5E",
    authDomain: "vision-education-8a794.firebaseapp.com",
    projectId: "vision-education-8a794",
    storageBucket: "vision-education-8a794.appspot.com",
    messagingSenderId: "324420775871",
    appId: "1:324420775871:web:b0371a1561be77b085fb0a"
  };

  const app  = initializeApp(config);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  const TARGET = "gisgreat308@gmail.com";

  function p(id, msg, cls) {
    const el = document.getElementById(id);
    el.textContent += (el.textContent ? "\n" : "") + msg;
    if (cls) el.className = cls;
  }

  window.adminLogin = async function() {
    const email = document.getElementById("adminEmail").value.trim();
    const pass  = document.getElementById("adminPass").value;
    const log   = document.getElementById("log");
    log.textContent = "";

    if (!email || !pass) { p("log","⚠ Fill in both fields."); return; }

    p("log", "→ Signing in...");
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      p("log", "✅ Signed in as " + email, "ok");
      setTimeout(() => {
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
      }, 800);
    } catch(err) {
      p("log", "❌ " + err.message, "err");
    }
  };

  window.grantPro = async function() {
    const btn = document.getElementById("grantBtn");
    btn.disabled = true;
    const log = document.getElementById("log2");
    log.textContent = "";

    p("log2", "→ Looking up user document...");

    const keysToTry = [TARGET, TARGET.toLowerCase()];
    let upgraded = false;

    for (const key of keysToTry) {
      try {
        const ref  = doc(db, "users", key);
        const snap = await getDoc(ref);

        if (snap.exists()) {
          const data = snap.data();
          p("log2", `✓ Found: ${data.name || key} (role: ${data.role || "none"})`);
          await updateDoc(ref, { role: "pro" });
          p("log2", "✅ Role updated to \"pro\" !", "ok");
          upgraded = true;
          break;
        }
      } catch(e) {
        p("log2", "⚠ key \"" + key + "\" failed: " + e.message);
      }
    }

    if (!upgraded) {
      p("log2", "⚠ Document not found — creating with pro role...");
      try {
        await setDoc(doc(db, "users", TARGET.toLowerCase()), {
          email: TARGET, role: "pro", createdAt: new Date().toISOString()
        }, { merge: true });
        p("log2", "✅ Pro document created!", "ok");
      } catch(e) {
        p("log2", "❌ " + e.message, "err");
        btn.disabled = false;
      }
    }
  };
</script>
</body>
</html>
