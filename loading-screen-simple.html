<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision EDU - Loading Screen Template</title>
</head>
<body>
  <!-- 
    ============================================
    VISION EDU - ULTRA-FAST LOADING SCREEN
    ============================================
    
    USAGE: Copy the code below (between the markers) 
    and paste it in the <head> section of your HTML file,
    BEFORE any other styles or scripts.
    
    ============================================
  -->
  
  <!-- START: Copy from here -->
  <style>
  #visionLoader{position:fixed;inset:0;background:#0f172a;z-index:99999;display:flex;align-items:center;justify-content:center;opacity:1;transition:opacity .3s}#visionLoader.hide{opacity:0;pointer-events:none}.vision-text{font-family:system-ui,-apple-system,sans-serif;font-size:clamp(2rem,8vw,4rem);font-weight:900;letter-spacing:.2em;color:#fff;animation:pulse 1.5s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}[data-theme=light] #visionLoader{background:#fff}[data-theme=light] .vision-text{color:#0f172a}
  </style>
  <div id="visionLoader"><div class="vision-text">VISION EDU</div></div>
  <script>
  window.addEventListener('load',function(){var l=document.getElementById('visionLoader');if(l){l.classList.add('hide');setTimeout(function(){l.remove()},300)}});
  </script>
  <!-- END: Copy to here -->
  
  <h1>Loading Screen Template</h1>
  <p>This is a template file. Copy the code between the markers above and paste it into your HTML pages.</p>
</body>
</html>
