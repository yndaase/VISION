<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision AI — Login</title>
  <meta name="description" content="Sign in to Vision AI - Your WASSCE intelligence engine" />
  <link rel="canonical" href="https://ai.visionedu.online/login" />
  <link rel="icon" type="image/png" href="https://visionedu.online/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="../firebase.js"></script>
  <link rel="stylesheet" href="login-styles.css" />
</head>
<body>
  <div class="login-bg">
    <span class="bg-orb bg-orb-1"></span>
    <span class="bg-orb bg-orb-2"></span>
    <span class="bg-orb bg-orb-3"></span>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">V</div>
        <div class="logo-text">Vision <span>AI</span></div>
      </div>

      <div style="text-align: center;">
        <div class="status-badge">
          <div class="status-dot"></div>
          AI Engine Online
        </div>
      </div>

      <div class="login-header">
        <h1 class="login-title">Welcome to Vision AI</h1>
        <p class="login-subtitle">Sign in to access your WASSCE intelligence engine with unlimited AI-powered learning</p>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <button class="google-btn" id="googleSignInBtn" onclick="triggerGoogleSignIn()">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div style="position: absolute; opacity: 0; pointer-events: none;">
        <div id="g_id_onload"
          data-client_id="378999569796-v8bj9miq61sggvpea5sbslc24dr9t71s.apps.googleusercontent.com"
          data-context="signin"
          data-ux_mode="popup"
          data-callback="handleGoogleCredential"
          data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
      </div>

      <div class="divider">or continue with email</div>

      <form class="login-form" id="loginForm" onsubmit="handleEmailLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="yourname@school.edu.gh" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Sign In to Vision AI
        </button>
      </form>

      <div class="login-links">
        Don't have an account? <a href="https://visionedu.online/login" target="_blank">Create one here</a><br>
        <a href="https://visionedu.online/login" target="_blank">Forgot password?</a><br>
        <a href="https://visionedu.online" target="_blank" style="margin-top: 8px; display: inline-block;">← Back to Main Site</a>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
