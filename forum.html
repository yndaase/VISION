<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <script>
    document.documentElement.setAttribute("data-theme", "dark");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Forum | Vision Education 2026</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            navy: {
              DEFAULT: '#05080f',
              light: '#0a101f',
              accent: '#1e293b'
            },
            emerald: {
              DEFAULT: '#10b981',
              light: '#34d399',
              dark: '#059669'
            },
            indigo: {
              DEFAULT: '#6366f1',
              light: '#818cf8',
              dark: '#4f46e5'
            }
          },
        }
      }
    }
  </script>
  <style>
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; }
    
    .sidebar-item { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar-item.active { background: rgba(99, 102, 241, 0.15); color: #fff; border-right: 3px solid #6366f1; }
    
    .cat-btn { transition: all 0.2s; }
    .cat-btn.active { background: #6366f1; color: white; border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }

    .thread-card:hover { border-color: rgba(99, 102, 241, 0.3); background: rgba(255,255,255,0.04); }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

    .modal-overlay { transition: opacity 0.3s; }
    .forum-textarea { resize: vertical; min-height: 120px; }
  </style>
</head>
<body class="bg-navy text-white font-sans min-h-screen flex selection:bg-indigo-500/30 overflow-x-hidden">

  <!-- Sidebar Component -->
  <aside class="w-80 border-r border-white/5 bg-navy-light/40 backdrop-blur-3xl sticky top-0 h-screen flex flex-col z-30 shrink-0">
    <div class="p-8 border-b border-white/5 flex items-center justify-between">
       <a href="/" class="flex items-center gap-3 group">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-[0_0_20px_rgba(99,102,241,0.3)]">V</div>
          <span class="font-black text-lg tracking-tight uppercase italic group-hover:text-indigo-400 transition-colors">Vision</span>
       </a>
    </div>

    <nav class="flex-1 p-6 space-y-2 overflow-y-auto">
       <a href="/dashboard" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm tracking-tight text-gray-400 hover:text-white group outline-none">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Overview
       </a>
       <a href="/mocks" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm tracking-tight text-gray-400 hover:text-white group outline-none">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Mock Exams
       </a>
       <a href="/forum.html" class="sidebar-item active w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm tracking-tight text-gray-400 hover:text-white group outline-none">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/></svg>
          Community Forum
       </a>
    </nav>

    <div class="p-8 border-t border-white/5">
       <a href="/dashboard" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/5 transition-all">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
          Back to Hub
       </a>
    </div>
  </aside>

  <!-- Main Wrapper -->
  <div class="flex-1 flex flex-col z-20 overflow-y-auto h-screen relative">
    
    <!-- Top Nav -->
    <header class="h-24 sticky top-0 bg-navy/80 backdrop-blur-2xl z-40 border-b border-white/5 px-10 flex items-center justify-between">
       <div class="flex items-center gap-6">
          <h2 class="text-xl font-black tracking-tighter uppercase italic text-indigo-400">Public <span class="text-white">Exchange</span></h2>
          <span class="w-px h-6 bg-white/10"></span>
          <div class="flex items-center gap-2 px-4 py-2 bg-indigo-500/10 border border-indigo-500/20 rounded-full">
             <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-pulse shadow-[0_0_10px_#6366f1]"></div>
             <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest leading-none">Global Sync Active</span>
          </div>
       </div>

       <div class="flex items-center gap-6">
          <div class="nav-user-chip flex items-center gap-3 pr-2 py-2 pl-4 glass-card rounded-2xl border-white/10">
             <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest" id="navUsername">Student</span>
             <div class="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center text-white font-black text-xs" id="navAvatar">S</div>
          </div>
       </div>
    </header>

    <!-- Content -->
    <main class="p-10 max-w-7xl mx-auto w-full space-y-16">
       
       <div id="forumListView" class="space-y-12">
          <section class="flex flex-col md:flex-row justify-between items-end gap-10">
             <div class="space-y-4">
                <h1 class="text-6xl font-black tracking-tighter leading-tight">Sync <span class="text-indigo-400 italic">Common.</span></h1>
                <p class="text-gray-400 text-lg max-w-xl font-medium">Ask questions, share diagnostics, and help fellow students master the 2026 fleet modules.</p>
             </div>
             <button onclick="openNewThreadModal()" class="px-8 py-4 bg-indigo-500 text-navy font-black text-xs uppercase tracking-widest rounded-2xl shadow-2xl shadow-indigo-500/10 hover:scale-105 transition-transform">Initialize Thread</button>
          </section>

          <div class="flex flex-wrap gap-2" id="forumCategories">
             <button onclick="filterForum('all', this)" class="cat-btn active px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/10 bg-white/5">Global Area</button>
             <button onclick="filterForum('maths', this)" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 text-gray-500">Core Maths</button>
             <button onclick="filterForum('english', this)" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 text-gray-500">English</button>
             <button onclick="filterForum('science', this)" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 text-gray-500">Science</button>
             <button onclick="filterForum('social', this)" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 text-gray-500">Social Studies</button>
             <button onclick="filterForum('general', this)" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 text-gray-500">General Discussion</button>
          </div>

          <div id="forumThreadList" class="grid md:grid-cols-2 gap-8">
             <!-- Populated via JS -->
          </div>

          <div id="forumEmpty" class="hidden py-40 text-center space-y-6">
             <div class="text-6xl mb-6">💬</div>
             <p class="text-gray-500 font-bold uppercase tracking-widest italic">No public threads detected in this sector.</p>
          </div>
       </div>

       <!-- THREAD DETAIL -->
       <div id="forumDetailView" class="hidden space-y-12">
          <button onclick="showThreadList()" class="flex items-center gap-3 text-[10px] font-black text-indigo-400 uppercase tracking-widest hover:text-white transition-all">
             <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
             Return to Exchange
          </button>

          <div id="forumDetailContent" class="space-y-10">
             <!-- Populated via JS -->
          </div>
       </div>

    </main>
  </div>

  <!-- NEW THREAD MODAL -->
  <div id="newThreadModal" class="hidden fixed inset-0 z-[100] bg-navy/90 backdrop-blur-3xl items-center justify-center p-6 modal-overlay">
     <div class="max-w-2xl w-full glass-card rounded-[4rem] p-16 border-white/10 space-y-10 shadow-[0_0_100px_rgba(99,102,241,0.2)] scroll-auto">
        <div class="flex justify-between items-center">
           <h2 class="text-3xl font-black tracking-tighter">Initialize <span class="text-indigo-400 italic">Discussion.</span></h2>
           <button onclick="closeNewThreadModal()" class="w-10 h-10 rounded-full glass border-white/10 flex items-center justify-center text-gray-500 hover:text-white">&times;</button>
        </div>

        <div class="space-y-6">
           <div class="space-y-2">
              <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest px-1">Target Sector</label>
              <select id="newThreadCategory" class="w-full bg-navy border border-white/10 rounded-2xl px-6 py-4 text-white outline-none focus:border-indigo-500 transition-all font-medium">
                <option value="maths">Core Mathematics</option>
                <option value="english">English Language</option>
                <option value="science">Integrated Science</option>
                <option value="social">Social Studies</option>
                <option value="general" selected>General Discussion</option>
              </select>
           </div>
           <div class="space-y-2">
              <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest px-1">Header Label</label>
              <input type="text" id="newThreadTitle" class="w-full bg-navy border border-white/10 rounded-2xl px-6 py-4 text-white outline-none focus:border-indigo-500 transition-all font-medium" placeholder="What is your inquiry?">
           </div>
           <div class="space-y-2">
              <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest px-1">Context Data</label>
              <textarea id="newThreadBody" class="forum-textarea w-full bg-navy border border-white/10 rounded-3xl px-6 py-4 text-white outline-none focus:border-indigo-500 transition-all font-medium" placeholder="Explain your theory or topic in detail..."></textarea>
           </div>
        </div>

        <button onclick="submitNewThread()" class="w-full py-5 bg-indigo-500 text-navy font-black text-xs uppercase tracking-widest rounded-2xl shadow-2xl shadow-indigo-500/20 hover:scale-105 transition-transform">Transmit Thread</button>
     </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // --- Data Engine (Functional Overhaul) ---
    const FORUM_KEY = 'vision_forum_threads';
    const SEED_THREADS = [
      { id: 't1', category: 'maths', title: 'Solving simultaneous equations with 3 unknowns?', body: 'Confused with 3 variables. Steps for elimination?', author: 'Kwame A.', authorEmail: 'kwame@demo.gh', createdAt: Date.now() - 172800000, replies: [{ id: 'r1', author: 'Ama S.', authorEmail: 'ama@demo.gh', body: 'Eliminate one variable from two pairs first!', createdAt: Date.now() - 86400000 }] },
      { id: 't2', category: 'english', title: 'Fastest way to bridge Lexis & Structure?', body: 'Run out of time in Section A. Speed hacks?', author: 'Efua D.', authorEmail: 'efua@demo.gh', createdAt: Date.now() - 86400000, replies: [] }
    ];

    function getThreads() { return JSON.parse(localStorage.getItem(FORUM_KEY)) || SEED_THREADS; }
    function saveThreads(ts) { localStorage.setItem(FORUM_KEY, JSON.stringify(ts)); }

    let currCat = 'all';

    function renderThreadList() {
      const ts = getThreads();
      const list = document.getElementById('forumThreadList');
      const empty = document.getElementById('forumEmpty');
      const filtered = currCat === 'all' ? ts : ts.filter(t => t.category === currCat);

      if (filtered.length === 0) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      filtered.sort((a,b) => b.createdAt - a.createdAt);

      list.innerHTML = filtered.map(t => `
        <div onclick="viewThread('${t.id}')" class="glass-card p-10 rounded-[3rem] border-white/5 space-y-6 group cursor-pointer thread-card">
           <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-2xl glass border-white/10 flex items-center justify-center font-black text-sm">${t.author.charAt(0)}</div>
              <div>
                 <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">${t.author}</p>
                 <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">${getTimeAgo(t.createdAt)}</p>
              </div>
              <span class="ml-auto px-3 py-1 glass rounded-lg text-[8px] font-black text-gray-500 uppercase tracking-widest border-white/10">${t.category}</span>
           </div>
           <h3 class="text-xl font-black text-white tracking-tight group-hover:text-indigo-400 transition-colors">${t.title}</h3>
           <p class="text-gray-500 text-sm line-clamp-2">${t.body}</p>
           <div class="pt-4 flex items-center gap-4 text-[9px] font-black text-gray-600 uppercase tracking-widest">
              <span class="flex items-center gap-2"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg> ${t.replies.length} Transmissions</span>
           </div>
        </div>
      `).join('');
    }

    function viewThread(id) {
      const ts = getThreads();
      const t = ts.find(x => x.id === id);
      if(!t) return;
      document.getElementById('forumListView').classList.add('hidden');
      document.getElementById('forumDetailView').classList.remove('hidden');
      
      document.getElementById('forumDetailContent').innerHTML = `
        <div class="glass-card p-12 rounded-[3.5rem] border-white/10 space-y-8">
           <div class="flex items-center gap-6">
              <div class="w-14 h-14 rounded-[1.5rem] bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center font-black text-indigo-400 text-lg">${t.author.charAt(0)}</div>
              <div>
                 <p class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400">${t.author}</p>
                 <p class="text-[9px] font-bold uppercase tracking-widest text-gray-600">${getTimeAgo(t.createdAt)}</p>
              </div>
              <span class="ml-auto px-4 py-2 glass rounded-xl text-[9px] font-black text-gray-500 border-white/5 uppercase tracking-[0.2em]">${t.category} Node</span>
           </div>
           <h2 class="text-4xl font-black tracking-tighter text-white">${t.title}</h2>
           <p class="text-gray-400 text-lg leading-relaxed whitespace-pre-wrap">${t.body}</p>
        </div>

        <div class="space-y-8">
           <div class="flex items-center gap-4 px-6">
              <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
              <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">${t.replies.length} Signal Responses Identified</p>
           </div>
           ${t.replies.map(r => `
             <div class="glass-card p-10 rounded-[3rem] border-white/5 space-y-4">
                <div class="flex items-center gap-4">
                   <div class="w-8 h-8 rounded-xl glass border-white/10 flex items-center justify-center font-black text-xs text-gray-400">${r.author.charAt(0)}</div>
                   <p class="text-[10px] font-black text-white uppercase tracking-widest">${r.author}</p>
                   <p class="text-[9px] font-black text-gray-600 ml-auto uppercase tracking-widest">${getTimeAgo(r.createdAt)}</p>
                </div>
                <p class="text-gray-400 font-medium leading-relaxed">${r.body}</p>
             </div>
           `).join('')}
        </div>

        <div class="glass-card p-12 rounded-[3.5rem] border-white/10 bg-indigo-500/5 space-y-6">
           <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Transmit Signal Reply</p>
           <textarea id="replyInput" class="forum-textarea w-full bg-navy border border-white/10 rounded-3xl px-6 py-4 text-white outline-none focus:border-indigo-500 transition-all font-medium" placeholder="Share your logic..."></textarea>
           <button onclick="submitReply('${t.id}')" class="px-10 py-5 bg-indigo-500 text-navy font-black text-xs uppercase tracking-widest rounded-2xl shadow-xl shadow-indigo-500/20">Authorize Transmission</button>
        </div>
      `;
    }

    function showThreadList() {
      document.getElementById('forumListView').classList.remove('hidden');
      document.getElementById('forumDetailView').classList.add('hidden');
      renderThreadList();
    }

    function submitReply(id) {
      const b = document.getElementById('replyInput').value.trim();
      if(!b) return;
      const ts = getThreads();
      const t = ts.find(x => x.id === id);
      const s = typeof getSession === 'function' ? getSession() : null;
      t.replies.push({ id:'r'+Date.now(), author: s?s.name:'Guest', authorEmail: s?s.email:'', body:b, createdAt:Date.now() });
      saveThreads(ts);
      viewThread(id);
    }

    function openNewThreadModal() { document.getElementById('newThreadModal').classList.replace('hidden', 'flex'); }
    function closeNewThreadModal() { document.getElementById('newThreadModal').classList.replace('flex', 'hidden'); }

    function submitNewThread() {
      const ti = document.getElementById('newThreadTitle').value.trim();
      const bo = document.getElementById('newThreadBody').value.trim();
      const ca = document.getElementById('newThreadCategory').value;
      if(!ti || !bo) return;
      const s = typeof getSession === 'function' ? getSession() : null;
      const ts = getThreads();
      ts.push({ id:'t'+Date.now(), category:ca, title:ti, body:bo, author:s?s.name:'Guest', authorEmail:s?s.email:'', createdAt:Date.now(), replies:[] });
      saveThreads(ts);
      closeNewThreadModal();
      document.getElementById('newThreadTitle').value='';
      document.getElementById('newThreadBody').value='';
      renderThreadList();
    }

    function filterForum(c, btn) {
      currCat = c;
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.remove('active', 'bg-white/5', 'text-white');
        b.classList.add('text-gray-500');
      });
      btn.classList.add('active', 'bg-white/5', 'text-white');
      btn.classList.remove('text-gray-500');
      renderThreadList();
    }

    function getTimeAgo(t) {
      const d = Date.now() - t; const m = Math.floor(d/60000);
      if(m<1) return 'Just now'; if(m<60) return m+'m ago';
      const h = Math.floor(m/60); if(h<24) return h+'h ago';
      const dy = Math.floor(h/24); if(dy<7) return dy+'d ago';
      return new Date(t).toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    }

    document.addEventListener('DOMContentLoaded', () => {
      const s = typeof getSession === 'function' ? getSession() : null;
      if(s) {
        document.getElementById('navUsername').textContent = s.name || 'Student';
        document.getElementById('navAvatar').textContent = (s.name || 'S').charAt(0).toUpperCase();
      }
      renderThreadList();
    });
  </script>
</body>
</html>
