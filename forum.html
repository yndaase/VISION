  <div class="main-wrapper">
    <!-- NAVBAR -->
    <nav class="dash-nav">
      <div class="dash-nav-inner">
        <a class="dash-logo" href="/dashboard">
          <img src="assets/logo.png" alt="Logo" style="height:32px;width:32px;object-fit:contain;margin-right:10px;">
          <span class="dash-logo-text">Vision <span class="brand-accent">Forum</span></span>
        </a>
        <div class="dash-nav-right">
          <span class="nav-badge">Community</span>
          <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme"></button>
          <div class="nav-user-chip">
            <div class="nav-avatar" id="navAvatar">S</div>
            <span class="nav-username" id="navUsername">Student</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- FORUM CONTENT -->
    <main class="forum-container">
      <!-- Thread List View -->
      <div id="forumListView">
        <header class="forum-header">
          <div>
            <h1 class="forum-title">Community Forum</h1>
            <p class="forum-subtitle">Ask questions, share tips, and help fellow students prepare for the 2026 WASSCE.</p>
          </div>
          <button class="forum-new-btn" onclick="openNewThreadModal()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Thread
          </button>
        </header>

        <div class="forum-categories" id="forumCategories">
          <button class="forum-cat-btn active" onclick="filterForum('all', this)">All</button>
          <button class="forum-cat-btn" onclick="filterForum('maths', this)"><span class="cat-dot cat-dot-maths"></span>Maths</button>
          <button class="forum-cat-btn" onclick="filterForum('english', this)"><span class="cat-dot cat-dot-english"></span>English</button>
          <button class="forum-cat-btn" onclick="filterForum('science', this)"><span class="cat-dot cat-dot-science"></span>Science</button>
          <button class="forum-cat-btn" onclick="filterForum('social', this)"><span class="cat-dot cat-dot-social"></span>Social</button>
          <button class="forum-cat-btn" onclick="filterForum('general', this)"><span class="cat-dot cat-dot-general"></span>General</button>
        </div>

        <div class="forum-thread-list" id="forumThreadList">
          <!-- Populated by JS -->
        </div>
        <div class="forum-empty" id="forumEmpty" style="display:none;">
          <div class="forum-empty-icon">💬</div>
          <p>No threads yet. Start a conversation!</p>
        </div>
      </div>

      <!-- Thread Detail View -->
      <div id="forumDetailView" class="forum-detail">
        <button class="forum-back-btn" onclick="showThreadList()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back to Threads
        </button>
        <div id="forumDetailContent">
          <!-- Populated by JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- New Thread Modal -->
  <div class="forum-modal-overlay" id="newThreadModal">
    <div class="forum-modal">
      <div class="forum-modal-header">
        <span class="forum-modal-title">Start a New Thread</span>
        <button class="forum-modal-close" onclick="closeNewThreadModal()">&times;</button>
      </div>
      <div class="forum-modal-body">
        <div>
          <label>Category</label>
          <select class="forum-select" id="newThreadCategory">
            <option value="maths">Core Mathematics</option>
            <option value="english">English Language</option>
            <option value="science">Integrated Science</option>
            <option value="social">Social Studies</option>
            <option value="general">General Discussion</option>
          </select>
        </div>
        <div>
          <label>Title</label>
          <input class="forum-input" id="newThreadTitle" placeholder="What's your question?" maxlength="120" />
        </div>
        <div>
          <label>Content</label>
          <textarea class="forum-textarea" id="newThreadBody" placeholder="Explain your question or topic in detail..." style="min-height:120px;"></textarea>
        </div>
        <button class="forum-submit-btn" onclick="submitNewThread()">Post Thread</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // ─── Forum Data Engine ───
    const FORUM_KEY = 'vision_forum_threads';

    const SEED_THREADS = [
      { id: 't1', category: 'maths', title: 'How do you solve simultaneous equations with 3 unknowns?', body: 'I keep getting confused when there are 3 variables. Can someone explain the elimination method step by step?', author: 'Kwame A.', authorEmail: 'kwame@demo.gh', createdAt: Date.now() - 86400000 * 2, replies: [
        { id: 'r1', author: 'Ama S.', authorEmail: 'ama@demo.gh', body: 'First, pick two pairs of equations and eliminate one variable from each pair. That gives you 2 equations with 2 unknowns. Then solve normally!', createdAt: Date.now() - 86400000 }
      ]},
      { id: 't2', category: 'science', title: 'Can someone explain the Krebs cycle in simple terms?', body: 'Biology section is killing me. I need a simple breakdown of the Krebs cycle that I can actually remember for the exam.', author: 'Efua D.', authorEmail: 'efua@demo.gh', createdAt: Date.now() - 86400000 * 3, replies: [
        { id: 'r2', author: 'Kofi M.', authorEmail: 'kofi@demo.gh', body: 'Think of it as a cycle that breaks down acetyl-CoA (from glucose) step by step, releasing CO2 and producing ATP, NADH, and FADH2. The products power the electron transport chain.', createdAt: Date.now() - 86400000 * 2 }
      ]},
      { id: 't3', category: 'english', title: 'Tips for the comprehension passage section?', body: 'I always run out of time reading the comprehension passage. Any tips for answering faster while still being accurate?', author: 'Nana A.', authorEmail: 'nana@demo.gh', createdAt: Date.now() - 86400000 * 1, replies: [] },
      { id: 't4', category: 'general', title: 'Who else is writing WASSCE November 2026?', body: 'Just curious how many of us are here preparing. Drop your school name below!', author: 'Adwoa F.', authorEmail: 'adwoa@demo.gh', createdAt: Date.now() - 86400000 * 5, replies: [
        { id: 'r3', author: 'Papa K.', authorEmail: 'papa@demo.gh', body: 'Adisadel College here! Let\'s go 🔥', createdAt: Date.now() - 86400000 * 4 },
        { id: 'r4', author: 'Akua T.', authorEmail: 'akua@demo.gh', body: 'St. Louis SHS checking in!', createdAt: Date.now() - 86400000 * 3 }
      ]},
      { id: 't5', category: 'social', title: 'Best way to memorize Ghana constitution chapters?', body: 'Social studies keeps asking about the constitution. How do you guys memorize the chapters and articles?', author: 'Yaw B.', authorEmail: 'yaw@demo.gh', createdAt: Date.now() - 86400000, replies: [] }
    ];

    function getThreads() {
      try {
        const stored = JSON.parse(localStorage.getItem(FORUM_KEY));
        return stored && stored.length ? stored : SEED_THREADS;
      } catch (e) {
        return SEED_THREADS;
      }
    }
    function saveThreads(threads) {
      localStorage.setItem(FORUM_KEY, JSON.stringify(threads));
    }

    let currentCategory = 'all';

    function renderThreadList() {
      const threads = getThreads();
      const list = document.getElementById('forumThreadList');
      const empty = document.getElementById('forumEmpty');
      
      const filtered = currentCategory === 'all' ? threads : threads.filter(t => t.category === currentCategory);
      
      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      // Sort by newest first
      filtered.sort((a, b) => b.createdAt - a.createdAt);

      list.innerHTML = filtered.map(t => {
        const initial = t.author.charAt(0).toUpperCase();
        const timeAgo = getTimeAgo(t.createdAt);
        return `
          <div class="forum-thread-card" onclick="viewThread('${t.id}')">
            <div class="forum-thread-top">
              <div class="forum-thread-avatar">${initial}</div>
              <div class="forum-thread-author">${t.author}</div>
              <div class="forum-thread-time">${timeAgo}</div>
            </div>
            <div class="forum-thread-title">${escapeHtml(t.title)}</div>
            <div class="forum-thread-preview">${escapeHtml(t.body)}</div>
            <div class="forum-thread-footer">
              <span class="forum-thread-cat forum-thread-cat-${t.category}">${t.category}</span>
              <span class="forum-thread-replies">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                ${t.replies ? t.replies.length : 0} replies
              </span>
            </div>
          </div>
        `;
      }).join('');
    }

    function viewThread(threadId) {
      const threads = getThreads();
      const thread = threads.find(t => t.id === threadId);
      if (!thread) return;

      document.getElementById('forumListView').style.display = 'none';
      const detail = document.getElementById('forumDetailView');
      detail.className = 'forum-detail active';

      const initial = thread.author.charAt(0).toUpperCase();
      const replies = thread.replies || [];

      document.getElementById('forumDetailContent').innerHTML = `
        <div class="forum-post">
          <div class="forum-post-header">
            <div class="forum-thread-avatar">${initial}</div>
            <div>
              <div class="forum-thread-author">${thread.author}</div>
              <div class="forum-thread-time">${getTimeAgo(thread.createdAt)}</div>
            </div>
            <span class="forum-thread-cat forum-thread-cat-${thread.category}" style="margin-left:auto;">${thread.category}</span>
          </div>
          <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:0.75rem;">${escapeHtml(thread.title)}</h2>
          <div class="forum-post-body">${escapeHtml(thread.body)}</div>
        </div>
        <h3 style="font-size:0.82rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem;">${replies.length} Replies</h3>
        ${replies.map(r => `
          <div class="forum-reply">
            <div class="forum-reply-header">
              <div class="forum-reply-avatar">${r.author.charAt(0).toUpperCase()}</div>
              <span style="font-size:0.82rem;font-weight:700;">${r.author}</span>
              <span style="font-size:0.7rem;color:var(--text-muted);margin-left:auto;">${getTimeAgo(r.createdAt)}</span>
            </div>
            <div class="forum-reply-body">${escapeHtml(r.body)}</div>
          </div>
        `).join('')}
        <div class="forum-reply-form">
          <label>Write a Reply</label>
          <textarea class="forum-textarea" id="replyInput" placeholder="Share your thoughts..."></textarea>
          <button class="forum-submit-btn" onclick="submitReply('${threadId}')">Post Reply</button>
        </div>
      `;
    }

    function showThreadList() {
      document.getElementById('forumListView').style.display = 'block';
      document.getElementById('forumDetailView').className = 'forum-detail';
      renderThreadList();
    }

    function submitReply(threadId) {
      const input = document.getElementById('replyInput');
      const body = input ? input.value.trim() : '';
      if (!body) return;

      const session = typeof getSession === 'function' ? getSession() : null;
      const threads = getThreads();
      const thread = threads.find(t => t.id === threadId);
      if (!thread) return;
      if (!thread.replies) thread.replies = [];

      thread.replies.push({
        id: 'r' + Date.now(),
        author: session ? session.name : 'Anonymous',
        authorEmail: session ? session.email : '',
        body: body,
        createdAt: Date.now()
      });

      saveThreads(threads);
      viewThread(threadId);
    }

    function openNewThreadModal() {
      document.getElementById('newThreadModal').classList.add('active');
    }
    function closeNewThreadModal() {
      document.getElementById('newThreadModal').classList.remove('active');
    }

    function submitNewThread() {
      const title = document.getElementById('newThreadTitle').value.trim();
      const body = document.getElementById('newThreadBody').value.trim();
      const category = document.getElementById('newThreadCategory').value;
      if (!title || !body) return;

      const session = typeof getSession === 'function' ? getSession() : null;
      const threads = getThreads();

      threads.push({
        id: 't' + Date.now(),
        category: category,
        title: title,
        body: body,
        author: session ? session.name : 'Anonymous',
        authorEmail: session ? session.email : '',
        createdAt: Date.now(),
        replies: []
      });

      saveThreads(threads);
      closeNewThreadModal();
      document.getElementById('newThreadTitle').value = '';
      document.getElementById('newThreadBody').value = '';
      renderThreadList();
    }

    function filterForum(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.forum-cat-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderThreadList();
    }

    // Utility
    function getTimeAgo(timestamp) {
      const diff = Date.now() - timestamp;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 7) return days + 'd ago';
      return new Date(timestamp).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      const session = typeof checkAuth === 'function' ? checkAuth() : null;
      if (session) {
        const navAvatar = document.getElementById('navAvatar');
        const navUsername = document.getElementById('navUsername');
        if (navAvatar) navAvatar.textContent = session.name ? session.name.charAt(0).toUpperCase() : 'S';
        if (navUsername) navUsername.textContent = session.name || 'Student';
      }
      renderThreadList();
    });
    window.addEventListener('click', (e) => {
      if (e.target.id === 'newThreadModal') closeNewThreadModal();
    });
  </script>
</body>
