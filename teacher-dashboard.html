<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <script>
      document.documentElement.setAttribute("data-theme", "dark");
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Vision Enterprise</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              navy: {
                DEFAULT: '#05080f',
                light: '#0a101f',
              },
              gold: {
                DEFAULT: '#fbbf24',
                light: '#fcd34d',
                dark: '#f59e0b'
              }
            },
          }
        }
      }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s ease; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(5, 8, 15, 0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(251, 191, 36, 0.3); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ent-input {
            width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; outline: none; transition: border-color 0.2s;
        }
        .ent-input:focus { border-color: #fbbf24; }
        select.ent-input option { background: #05080f; color: #fff; }

        .nav-item { transition: all 0.3s; }
        .nav-item.active { background: linear-gradient(90deg, rgba(251, 191, 36, 0.1), transparent); color: #fbbf24; border-left: 3px solid #fbbf24; padding-left: 20px; font-weight: 800; }
        
        #toast {
            position: fixed; bottom: 2rem; right: 2rem; background: #fbbf24; color: #000;
            padding: 1rem 2rem; border-radius: 12px; font-weight: 800; transform: translateY(100px); opacity: 0;
            transition: all 0.3s cubic-bezier(0.17, 0.84, 0.44, 1); z-index: 1000; box-shadow: 0 10px 30px rgba(251,191,36,0.3);
        }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-navy text-white font-sans min-h-screen grid lg:grid-cols-[280px_1fr] overflow-hidden selection:bg-gold-500/30 relative">

    <div class="fixed inset-0 pointer-events-none z-0">
       <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')] opacity-10"></div>
       <div class="absolute -top-[200px] -right-[200px] w-[500px] h-[500px] bg-gold-500/10 blur-[120px] rounded-full"></div>
    </div>

    <!-- SIDEBAR -->
    <aside class="hidden lg:flex flex-col border-r border-white/5 bg-navy-light/50 backdrop-blur-3xl h-screen overflow-y-auto sticky top-0 z-20">
        <div class="p-10 border-b border-white/5 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-gradient-to-br from-gold-500 to-yellow-600 rounded-2xl flex items-center justify-center text-2xl font-black text-navy shadow-[0_10px_25px_rgba(245,158,11,0.2)] mb-4" id="schoolLogo">V</div>
            <div class="font-black text-lg text-white mb-2" id="schoolName">Vision Institute</div>
            <div class="px-3 py-1 bg-gold-500/10 border border-gold-500/20 text-[10px] font-black text-gold-500 uppercase tracking-widest rounded-full">Faculty Member</div>
        </div>

        <nav class="flex-1 px-6 py-8 space-y-4">
            <button class="nav-item active w-full flex items-center gap-4 px-4 py-3 rounded-r-xl font-bold text-sm text-gray-400 hover:text-white" onclick="navTo('assignments', this)">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                Core Assignments
            </button>
            <button class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-r-xl font-bold text-sm text-gray-400 hover:text-white" onclick="navTo('create', this)">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                Deploy Protocol
            </button>
        </nav>

        <div class="p-6 border-t border-white/5 space-y-2 mt-auto">
            <button onclick="handleLogout()" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm text-red-400 hover:bg-white/5 transition-colors">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                End Session
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 lg:p-14 overflow-y-auto relative z-10">
        <header class="mb-12">
            <h2 class="text-4xl font-black text-white tracking-tight mb-2">Faculty Terminal</h2>
            <p class="text-gray-400 font-medium">Welcome, <span id="teacherNameDisplay" class="text-gold-400 font-bold">Teacher</span>! Enforce institutional curriculum logic.</p>
        </header>

        <!-- ASSIGNMENTS VIEW -->
        <section id="sec-assignments" class="section active space-y-8">
            <div class="glass-card p-10 rounded-[2.5rem] border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 bg-gradient-to-r from-transparent to-gold-500/5 border-r-gold-500/20">
                <div>
                   <h3 class="text-2xl font-black mb-2">Active Protocols</h3>
                   <p class="text-[10px] uppercase tracking-widest text-gray-500 font-black">Institutional Subsystems</p>
                </div>
                <button class="px-8 py-4 bg-gradient-to-r from-gold-500 to-yellow-600 text-navy font-black text-sm uppercase tracking-widest rounded-xl hover:scale-105 transition-transform shadow-lg shadow-gold-500/20" onclick="navTo('create', document.querySelectorAll('.nav-item')[1])">+ New Protocol</button>
            </div>
            
            <div id="assignmentList" class="space-y-4">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- CREATE ASSIGNMENT -->
        <section id="sec-create" class="section">
            <div class="glass-card max-w-3xl p-12 rounded-[3rem] border-white/5 relative overflow-hidden">
                <div class="absolute -right-20 -top-20 w-48 h-48 bg-gold-500/10 blur-[80px] rounded-full z-0"></div>
                <div class="relative z-10">
                    <h3 class="text-3xl font-black mb-8 border-b border-white/5 pb-6 text-white">Initialization Sequence</h3>
                    
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Subject Core</label>
                            <select id="hwSubject" class="ent-input bg-black/20 text-white font-bold h-14">
                                <option value="maths">Core Mathematics</option>
                                <option value="english">English Language</option>
                                <option value="science">Integrated Science</option>
                                <option value="social">Social Studies</option>
                                <option value="physics">Physics</option>
                                <option value="chemistry">Chemistry</option>
                                <option value="biology">Biology</option>
                                <option value="economics">Economics</option>
                                <option value="cs">Computer Science</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Directive Title</label>
                            <input id="hwTitle" placeholder="e.g. Logic Circuit Evaluation" class="ent-input bg-black/20 text-white h-14">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Mission Parameters (Instructions)</label>
                            <textarea id="hwBody" rows="5" placeholder="Specify execution constraints and rubric references..." class="ent-input bg-black/20 text-gray-300 py-4"></textarea>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Termination Date</label>
                            <input type="date" id="hwDate" class="ent-input bg-black/20 text-white h-14">
                        </div>

                        <button class="mt-8 px-10 py-5 bg-white text-navy font-black text-sm uppercase tracking-widest rounded-xl hover:bg-gray-200 w-full shadow-xl transition-all" onclick="createAssignment()">Enforce Directive</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast"></div>

    <script src="auth.js"></script>
    <script>
        const session = typeof checkAuth === 'function' ? checkAuth() : JSON.parse(sessionStorage.getItem('waec_session') || '{}');
        if (!session.email || session.role !== 'teacher') { window.location.href = "/login.html"; }

        function initUI() {
            document.getElementById("teacherNameDisplay").textContent = session.name || "Teacher";
            document.getElementById("schoolName").textContent = session.institutionName || "Vision Institution";
            document.getElementById("schoolLogo").textContent = (session.institutionName || "V").charAt(0).toUpperCase();
            document.getElementById("hwDate").min = new Date().toISOString().split('T')[0];
            renderAssignments();
        }

        function navTo(id, btnElement) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
        }

        function getAssignments() { return JSON.parse(localStorage.getItem('vision_assignments') || '[]'); }
        function saveAssignments(a) { localStorage.setItem('vision_assignments', JSON.stringify(a)); }

        function renderAssignments() {
            const allAssignments = getAssignments();
            const institutionAssignments = allAssignments.filter(a => a.institutionId === session.institutionId);
            const listEl = document.getElementById("assignmentList");
            
            if (institutionAssignments.length === 0) {
                listEl.innerHTML = `<div class="p-16 text-center border border-white/5 rounded-[2rem] bg-white/5"><p class="text-xl font-bold mb-2 text-white">No deployments found</p><p class="text-sm text-gray-500">Initiate a protocol to engage learners.</p></div>`;
                return;
            }

            institutionAssignments.sort((a, b) => b.createdAt - a.createdAt);

            listEl.innerHTML = institutionAssignments.map(a => `
                <div class="glass border-white/5 p-8 rounded-3xl flex flex-col md:flex-row justify-between items-start gap-6 hover:bg-white/5 transition-colors group">
                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-4 mb-4">
                            <span class="px-3 py-1 bg-gold-500/10 border border-gold-500/20 text-[10px] font-black text-gold-400 uppercase tracking-widest rounded-lg">${a.subject}</span>
                            <span class="text-xs font-bold text-gray-500">Deadline: ${new Date(a.dueDate).toLocaleDateString()}</span>
                        </div>
                        <h4 class="font-black text-xl text-white mb-2 truncate">${esc(a.title)}</h4>
                        <p class="text-sm text-gray-400 line-clamp-2 leading-relaxed mb-4">${esc(a.body)}</p>
                        <div class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">Enforced by ${esc(a.teacherName)}</div>
                    </div>
                    ${a.teacherEmail === session.email ? `<button class="shrink-0 px-6 py-3 bg-red-400/10 text-red-400 border border-red-500/20 text-xs font-black rounded-xl hover:bg-red-400/20 transition-colors" onclick="deleteAssignment('${a.id}')">Revoke Protocol</button>` : ''}
                </div>
            `).join("");
        }

        function createAssignment() {
            const subject = document.getElementById("hwSubject").value, title = document.getElementById("hwTitle").value.trim(), body = document.getElementById("hwBody").value.trim(), dueDate = document.getElementById("hwDate").value;
            if (!title || !body || !dueDate) { showToast("Critical error: Missing parameters."); return; }

            const assignments = getAssignments();
            assignments.push({
                id: 'hw_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                teacherEmail: session.email, teacherName: session.name || "Teacher",
                institutionId: session.institutionId, institutionName: session.institutionName,
                subject: subject, title: title, body: body, dueDate: new Date(dueDate).toISOString(), createdAt: Date.now()
            });
            saveAssignments(assignments);

            showToast("Protocol deployed.");
            document.getElementById("hwTitle").value = ""; document.getElementById("hwBody").value = ""; document.getElementById("hwDate").value = "";
            navTo('assignments', document.querySelectorAll('.nav-item')[0]);
            renderAssignments();
        }

        function deleteAssignment(id) {
            if (!confirm("Are you sure you want to revoke this protocol?")) return;
            let assignments = getAssignments();
            saveAssignments(assignments.filter(a => a.id !== id));
            showToast("Protocol revoked.");
            renderAssignments();
        }

        function showToast(msg) { const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
        function esc(s) { return String(s || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        document.addEventListener("DOMContentLoaded", initUI);
    </script>
</body>
</html>
