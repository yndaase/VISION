<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Vision Enterprise</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <script src="auth.js"></script>
    <style>
        :root {
            --ent-primary: #f59e0b; /* Amber for teachers */
            --ent-primary-glow: rgba(245, 158, 11, 0.15);
            --ent-accent: #fbbf24;
            --ent-bg: #050810;
            --ent-sidebar: #080b15;
            --ent-card: rgba(13, 17, 26, 0.6);
            --ent-border: rgba(255, 255, 255, 0.08);
            --ent-text-muted: #94a3b8;
            --font-main: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background: var(--ent-bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            color: #f1f5f9;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- LAYOUT --- */
        #teacherPortal {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background: var(--ent-sidebar);
            border-right: 1px solid var(--ent-border);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .school-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--ent-border);
        }

        .school-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--ent-primary), #d97706);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 1rem;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.2);
        }

        .school-name { font-size: 1.1rem; font-weight: 800; color: #f1f5f9; }
        .role-badge {
            margin-top: 8px; font-size: 0.7rem; font-weight: 800; color: #fbbf24;
            background: rgba(251, 191, 36, 0.1); padding: 4px 12px; border-radius: 100px;
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 12px; color: var(--ent-text-muted); font-weight: 600;
            margin-bottom: 6px; cursor: pointer; border: none; background: transparent; text-align: left; transition: all 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(245, 158, 11, 0.1); color: var(--ent-primary); }

        /* --- MAIN --- */
        .main { padding: 3rem; overflow-y: auto; }
        .header { margin-bottom: 3rem; }
        .header h2 { font-size: 2rem; margin: 0; font-weight: 800; }
        .header p { color: var(--ent-text-muted); margin-top: 8px; }

        .card {
            background: var(--ent-card); border: 1px solid var(--ent-border);
            border-radius: 24px; padding: 2rem; margin-bottom: 2rem;
            backdrop-filter: blur(12px);
        }
        
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:translateY(0)} }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
        .ent-input {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--ent-border); border-radius: 12px; color: #fff; font-family: inherit; font-size: 0.95rem;
        }
        .ent-input:focus { border-color: var(--ent-primary); outline: none; }
        select.ent-input option { background: var(--ent-bg); color: #fff; }

        .btn {
            padding: 12px 24px; border-radius: 12px; font-family: inherit; font-weight: 800; border: none; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--ent-primary); color: #000; }
        .btn-primary:hover { background: #fbbf24; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245,158,11,0.3); }
        .btn-danger { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); font-size: 0.8rem; padding: 6px 12px; }

        .assignment-list { display: flex; flex-direction: column; gap: 1rem; }
        .assignment-item {
            background: rgba(255,255,255,0.02); border: 1px solid var(--ent-border);
            padding: 1.5rem; border-radius: 16px; display: flex; justify-content: space-between; align-items: flex-start;
        }
        .tag { font-size: 0.7rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; background: rgba(245,158,11,0.15); color: #f59e0b; text-transform: uppercase; }

        #toast {
            position: fixed; bottom: 2rem; right: 2rem; background: #fff; color: #000;
            padding: 1rem 2rem; border-radius: 12px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        
        @media (max-width: 900px) {
            #teacherPortal { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .main { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="teacherPortal">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="school-brand">
                <div class="school-logo" id="schoolLogo">V</div>
                <div class="school-name" id="schoolName">Vision Institute</div>
                <div class="role-badge">Faculty Member</div>
            </div>

            <div class="nav-group">
                <button class="nav-item active" onclick="navTo('assignments', this)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    Assignments
                </button>
                <button class="nav-item" onclick="navTo('create', this)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    Create Homework
                </button>
            </div>

            <div style="margin-top: auto;">
                <button class="nav-item" style="color: #f87171;" onclick="handleLogout()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <header class="header">
                <h2>Teacher Dashboard</h2>
                <p>Welcome, <span id="teacherNameDisplay">Teacher</span>! Manage your institutional homework assignments.</p>
            </header>

            <!-- ASSIGNMENTS LIST -->
            <section id="sec-assignments" class="section active">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <h3 style="margin: 0; font-weight: 800; font-size: 1.4rem;">Active Assignments</h3>
                        <button class="btn btn-primary" onclick="navTo('create', document.querySelectorAll('.nav-item')[1])" style="padding: 8px 16px; font-size: 0.85rem;">+ New Assignment</button>
                    </div>
                    
                    <div id="assignmentList" class="assignment-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </section>

            <!-- CREATE ASSIGNMENT -->
            <section id="sec-create" class="section">
                <div class="card" style="max-width: 800px;">
                    <h3 style="margin-bottom: 2rem; font-weight: 800; font-size: 1.4rem;">Create New Homework</h3>
                    
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <select class="ent-input" id="hwSubject">
                            <option value="maths">Core Mathematics</option>
                            <option value="english">English Language</option>
                            <option value="science">Integrated Science</option>
                            <option value="social">Social Studies</option>
                            <option value="physics">Physics</option>
                            <option value="chemistry">Chemistry</option>
                            <option value="biology">Biology</option>
                            <option value="economics">Economics</option>
                            <option value="cs">Computer Science</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Assignment Title</label>
                        <input class="ent-input" id="hwTitle" placeholder="e.g. Algebra Practice Set 1">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Instructions / Description</label>
                        <textarea class="ent-input" id="hwBody" rows="5" placeholder="Detail the requirements, questions, or textbook pagereferences..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Due Date</label>
                        <input type="date" class="ent-input" id="hwDate">
                    </div>

                    <button class="btn btn-primary" onclick="createAssignment()">Publish Assignment</button>
                </div>
            </section>
        </main>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <script>
        // AUTH GUARD
        const session = checkAuth();
        if (!session || session.role !== 'teacher') {
            window.location.href = "/login";
        }

        // INIT DATA
        function initUI() {
            document.getElementById("teacherNameDisplay").textContent = session.name || "Teacher";
            document.getElementById("schoolName").textContent = session.institutionName || "Vision Institution";
            document.getElementById("schoolLogo").textContent = (session.institutionName || "V").charAt(0).toUpperCase();
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById("hwDate").min = today;
            
            renderAssignments();
        }

        function navTo(id, btnElement) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
        }

        function getAssignments() {
            return JSON.parse(localStorage.getItem('vision_assignments') || '[]');
        }

        function saveAssignments(assignments) {
            localStorage.setItem('vision_assignments', JSON.stringify(assignments));
        }

        function renderAssignments() {
            const allAssignments = getAssignments();
            // Filter only assignments created by this institution
            const institutionAssignments = allAssignments.filter(a => a.institutionId === session.institutionId);
            
            const listEl = document.getElementById("assignmentList");
            
            if (institutionAssignments.length === 0) {
                listEl.innerHTML = `<div style="text-align: center; padding: 3rem; color: var(--ent-text-muted);">
                    <p style="font-size: 2rem; margin-bottom: 1rem;">📚</p>
                    <p>No assignments published yet.</p>
                </div>`;
                return;
            }

            // Sort by newest first
            institutionAssignments.sort((a, b) => b.createdAt - a.createdAt);

            listEl.innerHTML = institutionAssignments.map(a => `
                <div class="assignment-item">
                    <div style="flex: 1;">
                        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                            <span class="tag">${a.subject.toUpperCase()}</span>
                            <span style="font-size: 0.8rem; color: var(--ent-text-muted);">Due: ${new Date(a.dueDate).toLocaleDateString()}</span>
                        </div>
                        <h4 style="margin: 0 0 6px 0; font-size: 1.1rem;">${esc(a.title)}</h4>
                        <p style="margin: 0 0 12px 0; font-size: 0.9rem; color: var(--ent-text-muted); line-height: 1.5; white-space: pre-wrap;">${esc(a.body)}</p>
                        <div style="font-size: 0.75rem; color: #64748b;">Assigned by ${esc(a.teacherName)} on ${new Date(a.createdAt).toLocaleDateString()}</div>
                    </div>
                    <div style="margin-left: 1rem;">
                        ${a.teacherEmail === session.email ? 
                            `<button class="btn btn-danger" onclick="deleteAssignment('${a.id}')">Delete</button>` 
                            : ''
                        }
                    </div>
                </div>
            `).join("");
        }

        function createAssignment() {
            const subject = document.getElementById("hwSubject").value;
            const title = document.getElementById("hwTitle").value.trim();
            const body = document.getElementById("hwBody").value.trim();
            const dueDate = document.getElementById("hwDate").value;

            if (!title || !body || !dueDate) {
                showToast("Please fill all required fields.");
                return;
            }

            const assignment = {
                id: 'hw_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                teacherEmail: session.email,
                teacherName: session.name || "Teacher",
                institutionId: session.institutionId,
                institutionName: session.institutionName,
                subject: subject,
                title: title,
                body: body,
                dueDate: new Date(dueDate).toISOString(),
                createdAt: Date.now()
            };

            const assignments = getAssignments();
            assignments.push(assignment);
            saveAssignments(assignments);

            showToast("Homework published successfully!");
            
            // Clear form
            document.getElementById("hwTitle").value = "";
            document.getElementById("hwBody").value = "";
            document.getElementById("hwDate").value = "";
            
            // Go back to list view
            navTo('assignments', document.querySelectorAll('.nav-item')[0]);
            renderAssignments();
        }

        function deleteAssignment(id) {
            if (!confirm("Are you sure you want to delete this assignment?")) return;
            
            let assignments = getAssignments();
            assignments = assignments.filter(a => a.id !== id);
            saveAssignments(assignments);
            
            showToast("Assignment deleted.");
            renderAssignments();
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        function esc(s) {
            return String(s || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        document.addEventListener("DOMContentLoaded", initUI);
    </script>
</body>
</html>
